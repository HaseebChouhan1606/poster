<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercury Eid Poster Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5eeff 0%, #e8d5ff 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { color: #5c3499; font-size: 24px; font-weight: 700; }
  .header p { color: #9a7abf; font-size: 13px; margin-top: 4px; }
  .main { display: flex; gap: 28px; align-items: flex-start; width: 100%; max-width: 960px; flex-wrap: wrap; justify-content: center; }
  .controls { background: white; border-radius: 18px; padding: 26px; box-shadow: 0 6px 24px rgba(92,52,153,0.12); width: 320px; flex-shrink: 0; }
  .controls h2 { color: #5c3499; font-size: 15px; font-weight: 700; margin-bottom: 18px; border-bottom: 2px solid #f0e6ff; padding-bottom: 10px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: #7a5fa0; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #d4b8f5; border-radius: 10px; font-size: 14px; outline: none; color: #333; transition: border 0.2s, box-shadow 0.2s; }
  input:focus { border-color: #7F47CC; box-shadow: 0 0 0 3px rgba(127,71,204,0.12); }
  .btn-generate { width: 100%; padding: 13px; background: #7B3FA0; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; letter-spacing: 0.3px; }
  .btn-generate:hover { background: #5c3499; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(92,52,153,0.3); }
  .btn-download { width: 100%; padding: 12px; background: #f0e6ff; color: #5c3499; border: 2px solid #d4b8f5; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
  .btn-download:hover { background: #e0ccff; }
  .preview-wrap { flex: 1; min-width: 300px; max-width: 500px; }
  canvas { width: 100%; border-radius: 16px; box-shadow: 0 10px 40px rgba(92,52,153,0.2); display: block; }
  .status { font-size: 12px; color: #9a7abf; text-align: center; margin-top: 10px; }
  .tip-box { background: #f8f0ff; border: 1px solid #e0ccff; border-radius: 10px; padding: 12px; margin-top: 14px; }
  .tip-box p { font-size: 12px; color: #7a5fa0; line-height: 1.5; }
  .tip-box strong { color: #5c3499; }
  select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #d4b8f5;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    color: #333;
    background: white;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🌙 Mercury Eid Poster Generator</h1>
  <p>Just Write you Name and Designation — Poster will generate automatically</p>
</div>

<div class="main">
  <div class="controls">
    <h2>✏️ Employee Details</h2>
    
    <div class="field">
      <label>Employee Name</label>
      <input id="nameInput" type="text" value="Muhammad Haseeb Chouhan" placeholder="Full name ..." />
    </div>
    
    <div class="field">
      <label>Designation</label>
      <input id="desigInput" type="text" value="Head Of Engineering & Technology" placeholder="Designation ..." />
    </div>

    <div class="field">
      <label>Template</label>
      <select id="templateSelect">
        <option value="MERCURY">Mercury</option>
        <option value="SMART1">Smart1</option>
      </select>
    </div>
    
    <button class="btn-generate" onclick="loadAndGenerate()">✨ Generate Poster</button>
    <button class="btn-download" onclick="downloadPoster()">⬇ Download PNG (High Quality)</button>

    <div class="tip-box">
      <p><strong>Tips:</strong><br>
      • Name automatically UPPERCASE
      </p>
    </div>
  </div>

  <div class="preview-wrap">
    <canvas id="posterCanvas"></canvas>
    <p class="status" id="status">Loading template...</p>
  </div>
</div>

    document.getElementById('status').textContent = 'Template ready!';
    generatePoster();
  };

  templateImg.onerror = () => {
    document.getElementById('status').textContent = 'Template load failed.';
  };

  templateImg.src = 'data:image/png;base64,' + TEMPLATE_B64;
}

function generatePoster() {
  const canvas = document.getElementById('posterCanvas');
  canvas.width = CW;
  canvas.height = CH;
  const ctx = canvas.getContext('2d');

  // Draw template
  ctx.drawImage(templateImg, 0, 0, CW, CH);

  const name = (document.getElementById('nameInput').value || 'EMPLOYEE NAME').toUpperCase();
  const desig = document.getElementById('desigInput').value || 'Designation';

  // Draw purple name box
  ctx.fillStyle = '#7B3FA0';
  roundRect(ctx, BOX_X1, BOX_Y1, BOX_W, BOX_Y2 - BOX_Y1, 5);
  ctx.fill();

  // Name text - split into lines
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  const nameLines = splitTextToLines(ctx, name, BOX_W - 100, 'bold 84px sans-serif');
  ctx.font = 'bold 84px sans-serif';
  const lineH = 80;
  const totalH = nameLines.length * lineH;
  const startY = BOX_Y1 + ((BOX_Y2 - BOX_Y1) - totalH) / 2;

  nameLines.forEach((line, i) => {
    ctx.fillText(line, BOX_CX, startY + i * lineH);
  });

  ctx.fillStyle = '#2a2a2a';
  ctx.font = 'bold 78px Arial';
  const desigLines = splitTextToLines(ctx, desig, BOX_W - 60, 'bold 78px Arial');
  ctx.font = 'bold 78px Arial';
  desigLines.forEach((line, i) => {
    ctx.fillText(line, BOX_CX, BOX_Y2 + 500 + i * 110);
  });

  document.getElementById('status').textContent = 'Poster ready! Download it.';
}

function splitTextToLines(ctx, text, maxWidth, fontStr) {
  ctx.font = fontStr;
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function downloadPoster() {
  const canvas = document.getElementById('posterCanvas');
  const name = document.getElementById('nameInput').value.replace(/\s+/g, '_') || 'poster';
  const link = document.createElement('a');
  link.download = `Eid_Poster_${name}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ✅ FIX: template change hone par fresh load karo
document.getElementById("templateSelect").addEventListener("change", loadAndGenerate);

// Auto-generate on input change (template already loaded)
document.getElementById('nameInput').addEventListener('input', generatePoster);
document.getElementById('desigInput').addEventListener('input', generatePoster);

// Initial load on page open
loadAndGenerate();
</script>
